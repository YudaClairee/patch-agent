$schema: "https://moonrepo.dev/schemas/project.json"

layer: application
language: python

tasks:
  install:
    command: "uv sync --all-packages"
  dev:
    command: "uv run uvicorn src.main:app --reload --port 8000"
    options:
      runInCI: false
  worker:
    command: "uv run celery --app src.worker.celery worker --loglevel=info"
    options:
      runInCI: false
  lint:
    command: "uv run ruff check ."
  format:
    command: "uv run ruff format ."
  typecheck:
    command: "uv run ty check"
